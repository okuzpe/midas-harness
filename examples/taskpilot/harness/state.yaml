midas_version: 0.5.20
name: taskpilot
mode: greenfield
language: en
created: 2026-06-16
updated: 2026-06-27
setup_complete: true

stage: sprint_execution
stage_status: not_started
entry_stage: idea_intake

cost_profile: balanced
routing:
  orchestrate: claude-opus-4-8
  build:       claude-sonnet-4-6
  scout:       claude-haiku-4-5

tools: [claude-code]
mcp:   [context7, sequential-thinking]

# Enforcement scaffolded in Phase 5 (recommend-don't-wall). doctor.mjs warns if a named config is
# missing; git_hooks/commit_msg installed:false = the solo dev deferred local hooks (CI still enforces).
enforcement:
  linter:     { config: product/biome.json, installed: true }
  formatter:  { config: product/biome.json, installed: true }
  git_hooks:  { config: product/lefthook.yml, installed: false }
  commit_msg: { config: product/commitlint.config.js, installed: false }
  ci:         { config: product/.github/workflows/ci.yml, installed: true }

phases:
  idea_intake:
    status: passed
    gate: passed
    artifacts: [product/idea.md]
  contextualize:
    status: passed
    gate: passed
    artifacts: [product/idea.md, product/open-questions.md]
  market_research:
    status: passed
    gate: passed
    artifacts: [product/market.md]
  business_case:
    status: passed
    gate: passed
    artifacts: [product/business-plan.md]
  tech_architecture:
    status: passed
    gate: passed
    artifacts: [product/architecture.md, product/adr/ADR-001-stack.md]
  architecture_rules:
    status: passed
    gate: passed
    artifacts:
      - harness/rules/folder-structure.md
      - harness/rules/tenant-isolation.md
      - harness/rules/session-cookies.md
      - product/conventions.md
      - product/design-direction.md
      - product/design-system.md
      - product/playbooks/add-api-route.md
      - product/playbooks/add-drizzle-migration.md
      - product/playbooks/bump-dependency.md
  sprint_planning:
    status: passed
    gate: passed
    artifacts: [product/roadmap.md, product/sprints/01-auth-and-task-crud.md]
  sprint_execution:
    status: passed
    gate: passed
    artifacts:
      - product/src/lib/db/schema.ts
      - product/src/lib/auth/session.ts
      - product/src/app/api/tasks/route.ts
  audit:
    status: passed
    gate: passed
    artifacts: [.harness/audits/audit-01.md]

sprints:
  - id: "01"
    title: "Auth + task CRUD"
    status: done
    audit_notes: "PASS (audit-01); amendment A-01 (sameSite=strict) deferred to Sprint 3"
    last_touched: 2026-06-27
  - id: "02"
    title: "Kanban board + list view"
    status: planned
    audit_notes: ""
    last_touched: 2026-06-27
  - id: "03"
    title: "Comments + invite flow + pilot launch"
    status: planned
    audit_notes: ""
    last_touched: 2026-06-27

last_audit:
  phase: audit
  sprint: "01"
  verdict: pass
  at: 2026-06-27

last_verification: { n: "01", fails: 0, at: 2026-06-27 }   # /midas-verify record (informational; never advances a gate)
