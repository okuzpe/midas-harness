# Build & deploy the MkDocs-Material docs site to GitHub Pages.
#
# Manual trigger by design, so it never shows a red check before Pages is set up.
# To enable:
#   1. Settings → Pages → Source → "GitHub Actions".
#   2. Run this workflow once (Actions → docs → Run workflow), or add a `push` trigger below.

name: docs

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        # docs: GitHub Actions security hardening via docs.github.com (2026-06-27).
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install MkDocs Material
        # docs: mkdocs-material@9.7.6 via PyPI and official changelog (2026-06-27).
        run: python -m pip install mkdocs-material==9.7.6

      - name: Build docs
        run: mkdocs build --site-dir _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
