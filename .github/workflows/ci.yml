name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # docs: GitHub Actions security hardening via docs.github.com (2026-06-27).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Structural test suite
        run: node scripts/test.mjs

      - name: Generated adapters in sync with source
        run: node scripts/doctor.mjs

      - name: Gate records consistent with state (taskpilot example)
        run: node scripts/doctor.mjs --strict --gates-only examples/taskpilot

      - name: Plugin tree in sync with .claude/
        run: |
          node scripts/build-plugin.mjs
          git diff --exit-code -- plugins .claude-plugin \
            || (echo "::error::plugins/ is stale — run 'node scripts/build-plugin.mjs' and commit" && exit 1)

      - name: create-midas template in sync with source
        run: |
          node scripts/build-create.mjs
          git diff --exit-code -- create-midas/template \
            || (echo "::error::create-midas/template is stale — run 'node scripts/build-create.mjs' and commit" && exit 1)

      - name: Installer smoke test (install into a temp dir + run doctor)
        run: |
          node create-midas/index.mjs /tmp/midas-smoke
          test -f /tmp/midas-smoke/AGENTS.md
          test -f /tmp/midas-smoke/.mcp.json
          test -f /tmp/midas-smoke/CLAUDE.md
          test -f /tmp/midas-smoke/GEMINI.md
          test -d /tmp/midas-smoke/.claude/skills
          node /tmp/midas-smoke/scripts/doctor.mjs

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d047a4c1fe1fd84a776e2e4c # v5
        with:
          python-version: "3.12"

      - name: Build docs site
        run: |
          pip install mkdocs-material==9.7.6
          mkdocs build --strict
