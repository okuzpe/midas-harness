name: Bug report
description: Something in Midas did not work as expected.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The commands you ran and the phase/skill involved.
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: AI tool
      options:
        - Claude Code
        - Cursor
        - GitHub Copilot
        - OpenAI Codex
        - Gemini CLI
        - Windsurf
        - Other
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS and Node version
      placeholder: "e.g. Windows 11, Node 20.11"
    validations:
      required: true
